<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <!-- Google Fonts: Fraunces (serif, used for brand/headings) + IBM Plex Sans/Mono (used for body/UI text) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- External stylesheet holding all layout/theme styles for this page -->
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <div class="wrap">

        <!-- ============ PAGE HEADER ============ -->
        <!-- App branding + a live counter showing total number of tasks -->
        <header class="top">
            <div>
                <p class="brand-eyebrow">Field Desk / Daily Log</p>
                <h1 class="brand">Deskline<em>.</em></h1>
            </div>
            <div class="top-meta">
                Total tasks
                <!-- Filled in dynamically by updateCount() -->
                <span class="count"></span>
            </div>
        </header>

        <div class="board">

            <!-- ============ ADD / EDIT TASK FORM ============ -->
            <!-- Same form is reused for both creating a new task and editing an existing one. Which mode it's in is tracked by the `editId` variable in the script below. -->
            <section class="form-card" aria-label="Add or edit a task">
                <span class="punch"></span>
                <h2>New Task Card</h2>

                <form id="task-form">
                    <!-- Task title (required) -->
                    <div class="field">
                        <label for="title">Title <span class="req">*</span></label>
                        <input type="text" id="title" name="title" placeholder="e.g. Draft client proposal" required>
                    </div>

                    <!-- Task description / notes (required) -->
                    <div class="field">
                        <label for="description">Description <span class="req">*</span></label>
                        <textarea id="description" name="description" placeholder="Add a short note about this task…"
                            required></textarea>
                    </div>

                    <!-- Due date (required, validated against today's date on submit) -->
                    <div class="field">
                        <label for="dueDate">Due date <span class="req">*</span></label>
                        <input type="date" id="dueDate" name="dueDate" required>
                    </div>

                    <!-- Priority selector: custom-styled radio buttons (Low is default) -->
                    <div class="field">
                        <label>Priority</label>
                        <div class="priority-picker">
                            <label class="p-low">
                                <input type="radio" id="low" name="priority" value="low" checked>
                                <span class="dot"></span><span>Low</span>
                            </label>
                            <label class="p-medium">
                                <input type="radio" id="medium" name="priority" value="medium">
                                <span class="dot"></span><span>Medium</span>
                            </label>
                            <label class="p-high">
                                <input type="radio" id="high" name="priority" value="high">
                                <span class="dot"></span><span>High</span>
                            </label>
                        </div>
                    </div>

                    <!-- Submit button label toggles between "Add Task" / "Update Task" depending on whether we're creating or editing -->
                    <div class="form-actions">
                        <button type="submit" id="submitBtn" class="btn btn-primary"></button>
                        <button type="reset" class="btn btn-ghost" onclick="resetForm()">Clear</button>
                    </div>
                </form>
            </section>

            <!-- ============ TASK LIST ============ -->
            <section aria-label="Task list">
                <div class="toolbar">

                    <!-- Live search box: filters visible tasks by title as the user types -->
                    <div class="search">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="11" cy="11" r="7" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input type="text" placeholder="Search tasks by title…" id="searchTitle">
                    </div>

                    <!-- Priority filter tabs: All / High / Medium / Low. Implemented as radio buttons (hidden) so only one tab can be active at a time; the visible <label> gets styled instead. -->
                    <div class="tabs">
                        <label class="tab all active">
                            <input type="radio" name="priorityFilter" value="all" checked style="display:none;"
                                onchange="filter(this.value)">
                            <span class="swatch"></span>All
                        </label>
                        <label class="tab high high-tab">
                            <input type="radio" name="priorityFilter" value="high" style="display:none;"
                                onchange="filter(this.value)">
                            <span class="swatch"></span>High
                        </label>
                        <label class="tab medium medium-tab">
                            <input type="radio" name="priorityFilter" value="medium" style="display:none;"
                                onchange="filter(this.value)">
                            <span class="swatch"></span>Medium
                        </label>
                        <label class="tab low low-tab">
                            <input type="radio" name="priorityFilter" value="low" style="display:none;"
                                onchange="filter(this.value)">
                            <span class="swatch"></span>Low
                        </label>
                    </div>
                    <br>


                </div>

                <!-- Task cards get injected here by displayTask() / filter() / search -->
                <div class="grid" id="tasks">
                </div>
            </section>

            <div>
            </div>

            <script>
               // ============ STATE ============

                // Master list of tasks, loaded from localStorage on page load.
                // Falls back to an empty array if nothing is stored yet.
                let tasks = JSON.parse(localStorage.getItem("Tasks")) || [];

                // editId / index track whether the form is in "edit mode":
                //   editId == -1  -> form is adding a NEW task
                //   editId != -1  -> form is editing the task with that id,
                //  `index` is that task's position in the tasks array
                let editId = -1, index = -1;

                // Tracks which filter tab is currently active ("all" | "high" | "medium" | "low").
                // Needed so that after add/edit/delete we can re-render the SAME tab the
                // user was looking at, instead of always resetting to "all".
                let currentFilter = "all";

                // Set the initial button label since the form starts in "add" mode
                document.getElementById("submitBtn").innerHTML = "Add Task";

                // ============ FORM SUBMIT (ADD or UPDATE task) ============
                document.getElementById("task-form").addEventListener("submit", (event) => {
                    event.preventDefault(); // stop normal page reload on submit

                    // Read form field values
                    let title = document.getElementById("title").value;
                    let description = document.getElementById("description").value;
                    let dueDate = document.getElementById("dueDate").value;
                    let priority = document.querySelector(`input[name="priority"]:checked`).value;

                    // Validate: due date cannot be in the past.
                    // Times are zeroed out so we're comparing calendar dates only,
                    // not exact timestamps (avoids false positives for "today").
                    let today = new Date();
                    let date = new Date(dueDate);
                    today.setHours(0, 0, 0, 0);
                    date.setHours(0, 0, 0, 0);
                    if (date < today) {
                        alert("Enter Correct Due Date");
                        return;
                    }

                    // Add a new task or update the one being edited (handled inside addTask)
                    addTask(title, description, dueDate, priority);

                    // Re-render whichever tab/filter is currently active, not just "all"
                    renderCurrent();

                    // Reset the form back to a clean "add task" state
                    event.target.reset();
                    document.getElementById("low").checked = true;
                    highlightSelectedPriority();
                    updateCount();
                });

                // ============ PRIORITY PICKER STYLING ============

                const priorityLabels = document.querySelectorAll('.priority-picker label');

                // Adds a "selected" class to whichever priority label's radio is checked,
                // so CSS can visually highlight the active choice.
                function highlightSelectedPriority() {
                    priorityLabels.forEach(label => {
                        const input = label.querySelector('input[type="radio"]');
                        label.classList.toggle('selected', input.checked);
                    });
                }

                // Reflect the default "checked" state (Low) as soon as the page loads
                highlightSelectedPriority();

                // Re-apply the highlight whenever the user picks a different priority
                priorityLabels.forEach(label => {
                    label.querySelector('input[type="radio"]')
                        .addEventListener('change', highlightSelectedPriority);
                });

                // ============ CREATE / UPDATE TASK IN STORAGE ============

                function addTask(title, description, dueDate, priority) {
                    if (editId == -1) {
                        // Not editing -> create a brand new task with a unique id
                        // (Date.now() gives a millisecond timestamp, good enough as a unique id here)
                        task = { id: Date.now(), title: title, description: description, dueDate: dueDate, priority: priority };
                        tasks.push(task);
                        alert("Task Added!");
                    }
                    else {
                        // Editing -> replace the existing task at its stored index
                        // with a new object that keeps the same id
                        let task = { id: editId, title: title, description: description, dueDate: dueDate, priority: priority }
                        tasks.splice(index, 1, task);
                        alert("Task Updated!");

                        // Reset back to "add" mode now that the edit is done
                        document.getElementById("submitBtn").innerHTML = "Add Task";
                        editId = -1;
                        index = -1;
                    }

                    // Persist the updated tasks array to localStorage
                    localStorage.setItem("Tasks", JSON.stringify(tasks));
                }

                // ============ RENDER: ALL TASKS (unfiltered) ============

                function displayTask() {
                    let html = "";

                    // Build one <article> card per task
                    tasks.forEach(task => {
                        html += `
                    <article class="task ${task.priority.toLowerCase()}">
                        <div class="task-top">
                            <h3>${task.title}</h3>
                            <span class="tag ${task.priority.toLowerCase()}">${task.priority}</span>
                        </div>
                        <p class="desc">${task.description}</p>
                        <div class="task-foot">
                            <span class="due">📅 ${task.dueDate}</span>
                            <div class="task-actions">
                                <span class="icon-btn" title="Edit" onclick="editTask(${task.id})">✎</span>
                                <span class="icon-btn danger" title="Delete" onclick="deleteTask(${task.id})">✕</span>
                            </div>
                        </div>
                    </article>
                `;
                    });

                    // Empty state when there are no tasks at all
                    if (tasks.length == 0) {
                        html = `<h3>Add New Task To Display Here</h3>`;
                    }

                    document.getElementById("tasks").innerHTML = html;
                    updateCount();
                }

                // Initial render on page load
                displayTask();

                // ============ EDIT TASK ============
                // Populates the form with an existing task's data so the user can update it.
                // Actual saving happens later when the form is submitted (see addTask()).
                function editTask(id) {
                    if (confirm("Are you sure you want to edit this task ?")) {
                        document.getElementById("submitBtn").innerHTML = "Update Task";

                        // Find the task by id and pre-fill the form fields with its data
                        tasks.forEach((task, i) => {
                            if (task.id == id) {
                                document.getElementById("title").value = task.title;
                                document.getElementById("description").value = task.description;
                                document.getElementById("dueDate").value = task.dueDate;
                                document.querySelector(`input[name="priority"][value="${task.priority}"]`).checked = true;
                                highlightSelectedPriority();

                                // Remember which task we're editing so addTask() knows to
                                // update instead of insert
                                editId = task.id;
                                index = i;
                            }
                        });
                    }

                    // Re-render the currently active tab (list itself hasn't changed yet,
                    // this just keeps the view consistent/refreshed)
                    renderCurrent();
                }

                // ============ DELETE TASK ============
                function deleteTask(id) {
                    if (confirm("Are you sure you want to delete this task ?")) {
                        // Remove the matching task from the array
                        tasks.forEach((task, index) => {
                            if (task.id == id) {
                                tasks.splice(index, 1);
                            }
                        });
                    }

                    // Persist the change
                    localStorage.setItem("Tasks", JSON.stringify(tasks));

                    // Re-render whichever tab was active instead of resetting to "all"
                    // (this is what keeps the High/Medium/Low tab view correct after a delete)
                    renderCurrent();
                }

                // ============ FILTER BY PRIORITY TAB ============
                // Called when the user clicks the All / High / Medium / Low tabs.
                function filter(value) {
                    // Remember the active tab so other actions (add/edit/delete)
                    // know which view to re-render afterwards.
                    currentFilter = value;

                    let html = "";

                    // Filter tasks matching the selected priority
                    let filterData = tasks.filter(task => task.priority.toLowerCase() == value);

                    // "All" tab shows everything, unfiltered
                    if (value == "all") {
                        filterData = [...tasks];
                    }

                    // Empty state for a tab with no matching tasks
                    if (filterData.length == 0) {
                        document.getElementById("tasks").innerHTML = `<h3 style="text-align: center;">No Task for ${value} priority</h3>`;
                        updateCount();
                        return;
                    }

                    // Build cards for the filtered tasks
                    filterData.forEach(task => {
                        html += `
                    <article class="task ${task.priority}">
                        <div class="task-top">
                            <h3>${task.title}</h3>
                            <span class="tag ${task.priority}">${task.priority}</span>
                        </div>
                        <p class="desc">${task.description}</p>
                        <div class="task-foot">
                            <span class="due">📅 ${task.dueDate}</span>
                            <div class="task-actions">
                                <span class="icon-btn" title="Edit" onclick="editTask(${task.id})">✎</span>
                                <span class="icon-btn danger" title="Delete" onclick="deleteTask(${task.id})">✕</span>
                            </div>
                        </div>
                    </article>
                `;
                    });

                    if (html == "") {
                        html = "<h3>No task found</h3>";
                    }

                    document.getElementById("tasks").innerHTML = html;
                    filterData = []; // clear temp array (not strictly necessary, but tidy)
                    updateCount(); // keep the task count in sync after filtering too
                }

                // ============ RE-RENDER HELPER ============
                // Central place that decides how to redraw the task list based on
                // whichever tab is currently selected. Used after add/edit/delete so the
                // user's current view (All/High/Medium/Low) is preserved instead of the
                // list snapping back to "All" every time.
                function renderCurrent() {
                    if (currentFilter === "all") {
                        displayTask();
                    } else {
                        filter(currentFilter);
                    }
                }

                // ============ LIVE SEARCH BY TITLE ============
                // Note: this search only looks at the full `tasks` list, so it currently
                // does not respect the active priority tab (a separate concern from filter()).
                document.getElementById("searchTitle").addEventListener("input", () => {
                    let searchTitle = document.getElementById("searchTitle").value.toLowerCase().trim();

                    let html = "";
                    tasks.forEach(task => {
                        if (task.title.toLowerCase().includes(searchTitle)) {
                            html += `
                    <article class="task ${task.priority}">
                        <div class="task-top">
                            <h3>${task.title}</h3>
                            <span class="tag ${task.priority}">${task.priority}</span>
                        </div>
                        <p class="desc">${task.description}</p>
                        <div class="task-foot">
                            <span class="due">📅 ${task.dueDate}</span>
                            <div class="task-actions">
                                <span class="icon-btn" title="Edit" onclick="editTask(${task.id})">✎</span>
                                <span class="icon-btn danger" title="Delete" onclick="deleteTask(${task.id})">✕</span>
                            </div>
                        </div>
                    </article>
                    `;
                        }
                    });
                    if (html == "") {
                        html = "<h3>No Task Found</h3>";
                    }
                    document.getElementById("tasks").innerHTML = html;
                });

                // ============ UTILITIES ============

                // Updates the "Total tasks" counter in the header
                function updateCount() {
                    document.querySelector(".count").innerHTML = tasks.length;
                }

                // Clears the form fields back to their default empty state
                function resetForm() {
                    document.getElementById("title").value = "";
                    document.getElementById("description").value = "";
                    document.getElementById("dueDate").value = "";
                    document.getElementById("low").checked = true;
                    highlightSelectedPriority();
                }

                // ============ TAB ACTIVE-STATE STYLING ============
                // Purely visual: toggles the "active" class so CSS can highlight
                // whichever priority tab is currently selected.
                const filterTabs = document.querySelectorAll('.tabs .tab');
                filterTabs.forEach(tab => {
                    tab.querySelector('input[type="radio"]').addEventListener('change', () => {
                        filterTabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                    });
                });
            </script>
</body>

</html>
